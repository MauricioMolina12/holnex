<app-profile-stats
  [stats]="stats()"
  [loading]="loading()"
></app-profile-stats>

<section class="recent-orders-section">
  <div class="recent-orders-header">
    <h2 class="section-title">Pedidos recientes</h2>
    <a routerLink="/profile/orders" class="view-all-link">Ver todos</a>
  </div>

  @if (recentOrders.length > 0) {
    <div class="orders-list">
      @for (order of recentOrders; track order.id) {
        <app-profile-order-card [order]="order"></app-profile-order-card>
      }
    </div>
  } @else if (!loading()) {
    <div class="empty-orders">
      <span class="icon-bag" style="font-size: 2.5rem; opacity: 0.4;"></span>
      <p>Aún no tienes pedidos recientes.</p>
    </div>
  }
</section>
