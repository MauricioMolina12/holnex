<form [formGroup]="form" (ngSubmit)="onSubmit()" class="edit-form">

  <div class="form-group">
    <label class="form-label" for="name">Nombre completo *</label>
    <input
      id="name"
      type="text"
      formControlName="name"
      class="form-control"
      [class.form-control--error]="isInvalid('name')"
      placeholder="Tu nombre completo"
    />
    @if (isInvalid('name')) {
      <span class="form-error">
        El nombre es requerido y debe tener al menos 2 caracteres.
      </span>
    }
  </div>

  <div class="form-group">
    <label class="form-label" for="phone">Teléfono</label>
    <input
      id="phone"
      type="tel"
      formControlName="phone"
      class="form-control"
      placeholder="Tu número de teléfono"
    />
  </div>

  <div class="form-group">
    <label class="form-label" for="address">Dirección</label>
    <input
      id="address"
      type="text"
      formControlName="address"
      class="form-control"
      placeholder="Tu dirección"
    />
  </div>

  <div class="form-group">
    <label class="form-label" for="countryId">País (código ISO)</label>
    <input
      id="countryId"
      type="text"
      formControlName="countryId"
      class="form-control"
      placeholder="Ej: MX, CO, AR"
    />
  </div>

  <div class="form-actions">
    <app-button
      text="Cancelar"
      variant="ghost"
      [classCustom]="{ bgColor: 'primary' }"
      type="button"
      (clicked)="onCancel()"
    ></app-button>
    <app-button
      text="Guardar cambios"
      variant="solid"
      [classCustom]="{ bgColor: 'primary' }"
      type="submit"
      [loading]="updating"
      [disabled]="form.invalid || updating"
      (clicked)="onSubmit()"
    ></app-button>
  </div>

</form>
