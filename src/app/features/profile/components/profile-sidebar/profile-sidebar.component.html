<div class="profile-sidebar">

  <div class="sidebar-profile">
    <div class="sidebar-avatar">
      @if (user?.avatar) {
        <img
          [src]="user!.avatar"
          [alt]="user!.name"
          class="sidebar-avatar-img"
        />
      } @else {
        <div class="sidebar-avatar-initials">
          {{ userInitials }}
        </div>
      }
    </div>
    <p class="sidebar-user-name">{{ user?.name || 'Usuario' }}</p>
    <p class="sidebar-user-email">{{ user?.email || '' }}</p>
  </div>

  <nav class="sidebar-nav">
    @for (link of links; track link.route) {
      <a
        [routerLink]="['/profile', link.route]"
        class="sidebar-link"
        [class.sidebar-link--active]="isActive(link.route)"
      >
        <span class="sidebar-link-icon" [class]="link.icon"></span>
        <span class="sidebar-link-label">{{ link.label }}</span>
      </a>
    }
  </nav>

  <div class="sidebar-logout">
    <button class="sidebar-logout-btn" type="button" (click)="onLogout()">
      <span class="icon-door"></span>
      <span>Cerrar sesión</span>
    </button>
  </div>

</div>
