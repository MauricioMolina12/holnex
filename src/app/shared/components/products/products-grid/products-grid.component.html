<section class="products" [ngStyle]="{'padding': padding, 'margin': margin }" [ngClass]="{'full-width': isfullWidth}">

  @if (hasHeader) {
    <header class="products__header">
      <div class="products__header-content">
        <div class="products__header-content-title">
          <h2 class="products__title title-section">{{title}}</h2>
          <span class="products__subtitle">{{subtitle}}</span>
        </div>

        @if (labelButton) {
      <app-button [text]="labelButton" aria-label="Ver todos los productos" variant="ghost" [classCustom]="{
          base: 'button',
          bgColor: 'primary-to-white',
          textColor: 'white',
          more: ['rounded-lg', 'p-4']
        }"></app-button>
        }

      </div>
    </header>
  }


  @if (showProducts) {
    <article class="products__grid">
      @for (product of visibleProducts; track product) {
        <div class="products__grid-item">
          <app-product-card [product]="product" (productClick)="productsService.detailProduct(product)">
          </app-product-card>
        </div>
      }
    </article>
  }

  @if (showSkeleton) {
    <article class="products__grid--skeleton">
      <app-skeleton [typeskeleton]="SkeletonTypeEnum.productsGrid"></app-skeleton>
    </article>
  }

  @if (showError) {
    <article class="products__emptyList">
      <app-status-ui-message [status]="{type: 'error', title: error}"></app-status-ui-message>
    </article>
  }


  @if (!loading && !isEmptyList) {
    <app-pagination [totalPages]="20"></app-pagination>
  }


</section>
